name: Daily Fintech Intern Agent

on:
  schedule:
    # Runs at 04:17 UTC daily. The odd minute bypasses bot detection.
    - cron: '17 4 * * *'
  workflow_dispatch: 

jobs:
  scrape_and_evaluate:
    runs-on: ubuntu-latest
    
    # THE KILL SWITCH: Forces the job to fail and stop consuming free minutes 
    # if it ever hangs for more than 10 minutes.
    timeout-minutes: 10 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' 

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Reads directly from your updated requirements.txt file
        pip install -r requirements.txt

    - name: Run AI Job Agent
      env:
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # Ensure this matches the exact name of your Python file
      run: |
        python job_search.py
