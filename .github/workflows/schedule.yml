name: Daily Fintech Intern Agent

on:
  schedule:
    # Runs at 04:17 UTC every day (early morning in Europe).
    # The odd minute (17) is crucial: it bypasses WAF bot-detection 
    # that heavily monitors top-of-the-hour (00) datacenter traffic.
    - cron: '17 4 * * *'
  workflow_dispatch: # Adds a button to trigger the script manually for testing

jobs:
  scrape_and_evaluate:
    runs-on: ubuntu-latest
    # Hard timeout prevents hung network requests from eating your monthly free compute minutes
    timeout-minutes: 45 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Caches dependencies to speed up subsequent runs

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # It is highly recommended to create a requirements.txt file in your repo.
        # If you don't have one, this line acts as a fallback.
        pip install pandas jobspy google-genai python-dotenv

    - name: Run AI Job Agent
      env:
        # Maps your secure GitHub Secrets to the OS environment variables
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python job_search.py
